<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1320" viewBox="0 0 1700 1320">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 14px Arial, sans-serif; fill: #4b5563; }
      .table-title { font: 700 15px Arial, sans-serif; fill: #111827; }
      .field { font: 12px Arial, sans-serif; fill: #111827; }
      .pk { font: 700 12px Arial, sans-serif; fill: #7c2d12; }
      .fk { font: 700 12px Arial, sans-serif; fill: #1d4ed8; }
      .rel { stroke: #374151; stroke-width: 1.8; fill: none; }
      .rel-label { font: 11px Arial, sans-serif; fill: #374151; }
      .note { font: 12px Arial, sans-serif; fill: #374151; }
      .box { fill: #ffffff; stroke-width: 1.5; rx: 8; ry: 8; }
      .header { stroke-width: 0; rx: 8; ry: 8; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1700" height="1320" fill="#f8fafc" />
  <text x="40" y="42" class="title">SRIM Database ERD</text>
  <text x="40" y="66" class="subtitle">ERD generated from Database/schema.sql. Onboarding links to candidates through offer - application - candidate.</text>

  <!-- Legend -->
  <g transform="translate(1320, 24)">
    <rect x="0" y="0" width="320" height="120" fill="#ffffff" stroke="#9ca3af" rx="8" />
    <text x="16" y="24" class="table-title">Legend</text>
    <rect x="16" y="42" width="18" height="12" fill="#ede9fe" stroke="#7c3aed" />
    <text x="44" y="52" class="note">Core / User Management</text>
    <rect x="16" y="64" width="18" height="12" fill="#dbeafe" stroke="#2563eb" />
    <text x="44" y="74" class="note">Recruitment Pipeline</text>
    <rect x="16" y="86" width="18" height="12" fill="#dcfce7" stroke="#16a34a" />
    <text x="44" y="96" class="note">Assessment</text>
    <rect x="168" y="42" width="18" height="12" fill="#ffedd5" stroke="#ea580c" />
    <text x="196" y="52" class="note">Interview</text>
    <rect x="168" y="64" width="18" height="12" fill="#fee2e2" stroke="#dc2626" />
    <text x="196" y="74" class="note">Offers</text>
    <rect x="168" y="86" width="18" height="12" fill="#fef3c7" stroke="#d97706" />
    <text x="196" y="96" class="note">System</text>
  </g>

  <!-- Relationships behind tables -->
  <path class="rel" d="M300 178 L350 178" marker-end="url(#arrow)" />
  <text x="310" y="168" class="rel-label">1--N</text>
  <path class="rel" d="M610 178 L660 178" marker-end="url(#arrow)" />
  <text x="620" y="168" class="rel-label">1--0..1</text>
  <path class="rel" d="M920 178 L990 178" marker-end="url(#arrow)" />
  <text x="936" y="168" class="rel-label">1--N</text>

  <path class="rel" d="M180 250 L180 325" marker-end="url(#arrow)" />
  <text x="190" y="292" class="rel-label">1--N</text>
  <path class="rel" d="M475 250 L475 325" marker-end="url(#arrow)" />
  <text x="485" y="292" class="rel-label">1--N created_by</text>
  <path class="rel" d="M780 250 L780 325 L610 325" marker-end="url(#arrow)" />
  <text x="786" y="292" class="rel-label">1--N</text>
  <path class="rel" d="M300 455 L350 455" marker-end="url(#arrow)" />
  <text x="310" y="445" class="rel-label">1--N</text>

  <path class="rel" d="M180 520 L180 595" marker-end="url(#arrow)" />
  <text x="190" y="560" class="rel-label">1--N</text>
  <path class="rel" d="M300 690 L350 690" marker-end="url(#arrow)" />
  <text x="310" y="680" class="rel-label">1--N</text>
  <path class="rel" d="M610 690 L660 690" marker-end="url(#arrow)" />
  <text x="620" y="680" class="rel-label">1--N</text>
  <path class="rel" d="M920 690 L990 690" marker-end="url(#arrow)" />
  <text x="936" y="680" class="rel-label">1--N</text>
  <path class="rel" d="M780 565 L780 595" marker-end="url(#arrow)" />
  <text x="790" y="586" class="rel-label">candidate 1--N</text>

  <path class="rel" d="M475 520 L475 850 L60 850" marker-end="url(#arrow)" />
  <text x="486" y="608" class="rel-label">application 1--N</text>
  <path class="rel" d="M300 945 L350 945" marker-end="url(#arrow)" />
  <text x="310" y="935" class="rel-label">1--N</text>
  <path class="rel" d="M610 945 L660 945" marker-end="url(#arrow)" />
  <text x="620" y="935" class="rel-label">1--N</text>
  <path class="rel" d="M300 980 L660 980" marker-end="url(#arrow)" />
  <text x="442" y="970" class="rel-label">interview 1--N feedback</text>
  <path class="rel" d="M610 485 L1090 485 L1090 850" marker-end="url(#arrow)" />
  <text x="1110" y="672" class="rel-label">application 1--1</text>
  <path class="rel" d="M475 520 L475 1110" marker-end="url(#arrow)" />
  <text x="486" y="1098" class="rel-label">application 1--1 offer</text>
  <path class="rel" d="M610 1180 L660 1180" marker-end="url(#arrow)" />
  <text x="620" y="1170" class="rel-label">1--1</text>
  <path class="rel" d="M475 250 L475 565 L780 565" marker-end="url(#arrow)" />
  <text x="505" y="550" class="rel-label">candidate 1--N assessment attempts</text>
  <path class="rel" d="M610 178 L1430 178 L1430 325" marker-end="url(#arrow)" />
  <text x="1450" y="290" class="rel-label">user 1--N notifications</text>

  <!-- Departments -->
  <g transform="translate(40, 110)">
    <rect class="box" x="0" y="0" width="260" height="140" stroke="#7c3aed" />
    <rect class="header" x="0" y="0" width="260" height="30" fill="#ede9fe" />
    <text x="12" y="20" class="table-title">2. departments</text>
    <text x="12" y="48" class="pk">PK department_id</text>
    <text x="12" y="66" class="field">name</text>
    <text x="12" y="84" class="field">description</text>
    <text x="12" y="102" class="fk">FK parent_department_id</text>
    <text x="12" y="120" class="field">created_at, updated_at</text>
  </g>

  <!-- Users -->
  <g transform="translate(350, 110)">
    <rect class="box" x="0" y="0" width="260" height="140" stroke="#7c3aed" />
    <rect class="header" x="0" y="0" width="260" height="30" fill="#ede9fe" />
    <text x="12" y="20" class="table-title">1. users</text>
    <text x="12" y="48" class="pk">PK user_id</text>
    <text x="12" y="66" class="fk">FK department_id</text>
    <text x="12" y="84" class="field">name, email unique</text>
    <text x="12" y="102" class="field">password_hash</text>
    <text x="12" y="120" class="field">role, status, timestamps</text>
  </g>

  <!-- Candidates -->
  <g transform="translate(660, 110)">
    <rect class="box" x="0" y="0" width="260" height="140" stroke="#7c3aed" />
    <rect class="header" x="0" y="0" width="260" height="30" fill="#ede9fe" />
    <text x="12" y="20" class="table-title">4. candidates</text>
    <text x="12" y="48" class="pk">PK/FK candidate_id</text>
    <text x="12" y="66" class="field">phone</text>
    <text x="12" y="84" class="field">current_title</text>
    <text x="12" y="102" class="field">years_experience, location</text>
    <text x="12" y="120" class="field">resume_url, timestamps</text>
  </g>

  <!-- Candidate Merge Log -->
  <g transform="translate(990, 110)">
    <rect class="box" x="0" y="0" width="280" height="150" stroke="#d97706" />
    <rect class="header" x="0" y="0" width="280" height="30" fill="#fef3c7" />
    <text x="12" y="20" class="table-title">candidate_merge_log</text>
    <text x="12" y="48" class="pk">PK merge_id</text>
    <text x="12" y="66" class="fk">FK primary_candidate_id</text>
    <text x="12" y="84" class="fk">FK duplicate_candidate_id</text>
    <text x="12" y="102" class="fk">FK merged_by</text>
    <text x="12" y="120" class="field">merged_at, notes</text>
  </g>

  <!-- Job Requisitions -->
  <g transform="translate(40, 325)">
    <rect class="box" x="0" y="0" width="260" height="195" stroke="#2563eb" />
    <rect class="header" x="0" y="0" width="260" height="30" fill="#dbeafe" />
    <text x="12" y="20" class="table-title">3. job_requisitions</text>
    <text x="12" y="48" class="pk">PK job_id</text>
    <text x="12" y="66" class="fk">FK department_id</text>
    <text x="12" y="84" class="field">title</text>
    <text x="12" y="102" class="field">description</text>
    <text x="12" y="120" class="field">requirements</text>
    <text x="12" y="138" class="field">status</text>
    <text x="12" y="156" class="fk">FK created_by</text>
    <text x="12" y="174" class="field">created_at, updated_at</text>
  </g>

  <!-- Applications -->
  <g transform="translate(350, 325)">
    <rect class="box" x="0" y="0" width="260" height="195" stroke="#2563eb" />
    <rect class="header" x="0" y="0" width="260" height="30" fill="#dbeafe" />
    <text x="12" y="20" class="table-title">5. applications</text>
    <text x="12" y="48" class="pk">PK application_id</text>
    <text x="12" y="66" class="fk">FK candidate_id</text>
    <text x="12" y="84" class="fk">FK job_id</text>
    <text x="12" y="102" class="field">status</text>
    <text x="12" y="120" class="field">match_score</text>
    <text x="12" y="138" class="field">applied_at, updated_at</text>
    <text x="12" y="156" class="field">unique candidate + job</text>
  </g>

  <!-- Notifications -->
  <g transform="translate(1320, 325)">
    <rect class="box" x="0" y="0" width="260" height="160" stroke="#d97706" />
    <rect class="header" x="0" y="0" width="260" height="30" fill="#fef3c7" />
    <text x="12" y="20" class="table-title">16. notifications</text>
    <text x="12" y="48" class="pk">PK notification_id</text>
    <text x="12" y="66" class="fk">FK user_id</text>
    <text x="12" y="84" class="field">title, message</text>
    <text x="12" y="102" class="field">type</text>
    <text x="12" y="120" class="field">is_read</text>
    <text x="12" y="138" class="field">created_at, read_at</text>
  </g>

  <!-- Assessments -->
  <g transform="translate(40, 595)">
    <rect class="box" x="0" y="0" width="260" height="190" stroke="#16a34a" />
    <rect class="header" x="0" y="0" width="260" height="30" fill="#dcfce7" />
    <text x="12" y="20" class="table-title">6. assessments</text>
    <text x="12" y="48" class="pk">PK assessment_id</text>
    <text x="12" y="66" class="fk">FK job_id</text>
    <text x="12" y="84" class="field">title</text>
    <text x="12" y="102" class="field">description</text>
    <text x="12" y="120" class="field">type</text>
    <text x="12" y="138" class="field">duration_minutes</text>
    <text x="12" y="156" class="field">created_at, updated_at</text>
  </g>

  <!-- Questions -->
  <g transform="translate(350, 595)">
    <rect class="box" x="0" y="0" width="260" height="190" stroke="#16a34a" />
    <rect class="header" x="0" y="0" width="260" height="30" fill="#dcfce7" />
    <text x="12" y="20" class="table-title">7. questions</text>
    <text x="12" y="48" class="pk">PK question_id</text>
    <text x="12" y="66" class="fk">FK assessment_id</text>
    <text x="12" y="84" class="field">type</text>
    <text x="12" y="102" class="field">difficulty_level</text>
    <text x="12" y="120" class="field">question_text</text>
    <text x="12" y="138" class="field">options JSON</text>
    <text x="12" y="156" class="field">correct_answer, points</text>
  </g>

  <!-- Candidate Assessments -->
  <g transform="translate(660, 595)">
    <rect class="box" x="0" y="0" width="260" height="190" stroke="#16a34a" />
    <rect class="header" x="0" y="0" width="260" height="30" fill="#dcfce7" />
    <text x="12" y="20" class="table-title">8. candidate_assessments</text>
    <text x="12" y="48" class="pk">PK ca_id</text>
    <text x="12" y="66" class="fk">FK candidate_id</text>
    <text x="12" y="84" class="fk">FK assessment_id</text>
    <text x="12" y="102" class="field">start_time, end_time</text>
    <text x="12" y="120" class="field">status</text>
    <text x="12" y="138" class="field">score</text>
    <text x="12" y="156" class="field">created_at</text>
  </g>

  <!-- Submissions -->
  <g transform="translate(990, 595)">
    <rect class="box" x="0" y="0" width="280" height="190" stroke="#16a34a" />
    <rect class="header" x="0" y="0" width="280" height="30" fill="#dcfce7" />
    <text x="12" y="20" class="table-title">9. submissions</text>
    <text x="12" y="48" class="pk">PK submission_id</text>
    <text x="12" y="66" class="fk">FK ca_id</text>
    <text x="12" y="84" class="fk">FK question_id nullable</text>
    <text x="12" y="102" class="field">answer_text</text>
    <text x="12" y="120" class="field">code_output</text>
    <text x="12" y="138" class="field">is_correct</text>
    <text x="12" y="156" class="field">plagiarism_score, created_at</text>
  </g>

  <!-- Interviews -->
  <g transform="translate(40, 850)">
    <rect class="box" x="0" y="0" width="260" height="170" stroke="#ea580c" />
    <rect class="header" x="0" y="0" width="260" height="30" fill="#ffedd5" />
    <text x="12" y="20" class="table-title">10. interviews</text>
    <text x="12" y="48" class="pk">PK interview_id</text>
    <text x="12" y="66" class="fk">FK application_id</text>
    <text x="12" y="84" class="field">interview_type</text>
    <text x="12" y="102" class="field">scheduled_at</text>
    <text x="12" y="120" class="field">duration_minutes</text>
    <text x="12" y="138" class="field">status, created_at</text>
  </g>

  <!-- Interviewers Assignment -->
  <g transform="translate(350, 850)">
    <rect class="box" x="0" y="0" width="260" height="170" stroke="#ea580c" />
    <rect class="header" x="0" y="0" width="260" height="30" fill="#ffedd5" />
    <text x="12" y="20" class="table-title">11. interviewers_assignment</text>
    <text x="12" y="48" class="pk">PK assignment_id</text>
    <text x="12" y="66" class="fk">FK interview_id</text>
    <text x="12" y="84" class="fk">FK interviewer_id</text>
    <text x="12" y="102" class="field">role_in_panel</text>
    <text x="12" y="120" class="field">is_shadowing</text>
    <text x="12" y="138" class="field">unique interview + user</text>
  </g>

  <!-- Interview Feedback -->
  <g transform="translate(660, 850)">
    <rect class="box" x="0" y="0" width="260" height="190" stroke="#ea580c" />
    <rect class="header" x="0" y="0" width="260" height="30" fill="#ffedd5" />
    <text x="12" y="20" class="table-title">12. interview_feedback</text>
    <text x="12" y="48" class="pk">PK feedback_id</text>
    <text x="12" y="66" class="fk">FK interview_id</text>
    <text x="12" y="84" class="fk">FK interviewer_id</text>
    <text x="12" y="102" class="field">technical_score</text>
    <text x="12" y="120" class="field">communication_score</text>
    <text x="12" y="138" class="field">culture_fit_score</text>
    <text x="12" y="156" class="field">overall_score, comments</text>
  </g>

  <!-- Final Evaluations -->
  <g transform="translate(990, 850)">
    <rect class="box" x="0" y="0" width="280" height="170" stroke="#ea580c" />
    <rect class="header" x="0" y="0" width="280" height="30" fill="#ffedd5" />
    <text x="12" y="20" class="table-title">13. final_evaluations</text>
    <text x="12" y="48" class="pk">PK evaluation_id</text>
    <text x="12" y="66" class="fk">FK application_id unique</text>
    <text x="12" y="84" class="field">aggregated_score</text>
    <text x="12" y="102" class="field">recommendation</text>
    <text x="12" y="120" class="field">status</text>
    <text x="12" y="138" class="field">created_at</text>
  </g>

  <!-- Offers -->
  <g transform="translate(350, 1110)">
    <rect class="box" x="0" y="0" width="260" height="180" stroke="#dc2626" />
    <rect class="header" x="0" y="0" width="260" height="30" fill="#fee2e2" />
    <text x="12" y="20" class="table-title">14. offers</text>
    <text x="12" y="48" class="pk">PK offer_id</text>
    <text x="12" y="66" class="fk">FK application_id unique</text>
    <text x="12" y="84" class="field">offer_type</text>
    <text x="12" y="102" class="field">ctc, bonus</text>
    <text x="12" y="120" class="field">stock_options</text>
    <text x="12" y="138" class="field">status, expiry_date</text>
    <text x="12" y="156" class="field">sent_at, accepted_at</text>
  </g>

  <!-- Onboarding -->
  <g transform="translate(660, 1110)">
    <rect class="box" x="0" y="0" width="260" height="160" stroke="#dc2626" />
    <rect class="header" x="0" y="0" width="260" height="30" fill="#fee2e2" />
    <text x="12" y="20" class="table-title">15. onboarding</text>
    <text x="12" y="48" class="pk">PK onboarding_id</text>
    <text x="12" y="66" class="fk">FK offer_id unique</text>
    <text x="12" y="84" class="field">status</text>
    <text x="12" y="102" class="field">start_date</text>
    <text x="12" y="120" class="field">documents_completed</text>
    <text x="12" y="138" class="field">created_at</text>
  </g>

  <text x="990" y="1150" class="note">Best-practice fix applied: onboarding does not store candidate_id.</text>
  <text x="990" y="1170" class="note">Candidate is derived via onboarding.offer_id - offers.application_id - applications.candidate_id.</text>
</svg>
